plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.devicekey'
version = '0.7.10'

android {
  namespace "expo.modules.devicekey"

  defaultConfig {
    minSdkVersion 24
    versionCode 1
    versionName "0.7.10"
  }

  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation "androidx.biometric:biometric:1.2.0-alpha05"
  implementation "androidx.fragment:fragment-ktx:1.8.6"
}
